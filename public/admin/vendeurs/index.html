<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Vendeurs</title>
  <link rel="stylesheet" href="../../admin/css/dashboard.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1> Vendeurs</h1>
    <div class="user-info">
        <li><a href="../../admin/dashboard.html" class="active"> Dashboard</a></li>
        <li><a href="../../admin/vendeurs/index.html">Vendeurs</a></li>
        <li><a href="../../admin/produits/categories/index.html"> Catégories</a></li>
        <li><a href="../../admin/produits/produits/index.html"> Produits</a></li>
        <li><a href="../../admin/stock/index.html"> Stock</a></li>
        <li><a href="../../admin/ventes/index.html"> Ventes</a></li>
        <li><a href="../../admin/clients/index.html"> Clients</a></li>
        <li><a href="../../admin/rapports/index.html"> Rapports</a></li>
        <li><a href="../../admin/parametres/index.html"> Paramètres</a></li>
        <li><a href="../../admin/logs/index.html"> Journaux</a></li>
        <button id="logoutBtn">Déconnexion</button>
    </div>
  </header>
  <main>
    <div class="toolbar">
      <button id="btnAjouter">Nouveau vendeur</button>
    </div>
    <table id="tableVendeurs">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nom utilisateur</th>
          <th>Nom complet</th>
          <th>Téléphone</th>
          <th>Statut</th>
          <th>Dernière connexion</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="vendeursBody">
        <tr><td colspan="7">Chargement...</td></tr>
      </tbody>
    </table>
  </main>
  <script src="../../shared/js/api.js"></script>
  <script src="js/vendeurs.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      chargerVendeurs();
      document.getElementById('btnAjouter').addEventListener('click', () => {
        window.location.href = 'ajouter.html';
      });
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = '../../index.html';
      });
    });
  </script>
</body>
</html>
