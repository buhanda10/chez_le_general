<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajustement de stock</title>
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar" id="sidebar-container">
    </nav>
    <div class="main-wrapper">
      <header class="topbar">
        <h1>🔧 Ajustement manuel</h1>
        <a href="index.html" class="btn-link">← Retour</a>
      </header>
      <main class="content">
        <form id="formAjustement">
          <div class="input-group">
            <label>Produit / Variation</label>
            <select id="variation_id" required></select>
          </div>
          <div class="input-group">
            <label>Nouveau stock</label>
            <input type="number" id="nouveau_stock" min="0" required>
          </div>
          <div class="input-group">
            <label>Raison</label>
            <input type="text" id="raison" placeholder="Correction inventaire">
          </div>
          <button type="submit"> Appliquer l'ajustement</button>
          <p id="message"></p>
        </form>
      </main>
    </div>
  </div>
  <script src="../../../shared/js/api.js"></script>
  <script src="js/ajustement.js"></script>
    <script src="../../admin/js/sidebar.js"></script>
</body>
</html>
