<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Journaux d'activité</title>
  <link rel="stylesheet" href="../../admin/css/dashboard.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar" id="sidebar-container">
    </nav>
    <div class="main-wrapper">
      <header class="topbar">
        <h1>Journaux d'activité</h1>
      </header>
      <main class="content">
        <div class="filtres">
          <input type="date" id="date_debut" placeholder="Du">
          <input type="date" id="date_fin" placeholder="Au">
          <select id="utilisateur_id"><option value="">Tous utilisateurs</option></select>
          <select id="action">
            <option value="">Toutes actions</option>
            <option value="Connexion">Connexion</option>
            <option value="Création vendeur">Création vendeur</option>
            <option value="Modification vendeur">Modification vendeur</option>
            <option value="Désactivation vendeur">Désactivation vendeur</option>
            <option value="Création catégorie">Création catégorie</option>
            <option value="Modification catégorie">Modification catégorie</option>
            <option value="Suppression catégorie">Suppression catégorie</option>
            <option value="Création produit">Création produit</option>
            <option value="Modification produit">Modification produit</option>
            <option value="Désactivation produit">Désactivation produit</option>
            <option value="Entrée stock">Entrée stock</option>
            <option value="Ajustement stock">Ajustement stock</option>
            <option value="Modification paramètres">Modification paramètres</option>
          </select>
          <button id="btnFiltrer" class="btn-link">Filtrer</button>
        </div>
        <table id="tableLogs">
          <thead><tr><th>Date</th><th>Utilisateur</th><th>Action</th><th>Détails</th></tr></thead>
          <tbody id="logsBody"><tr><td colspan="4">Chargement...</td></tr></tbody>
        </table>
        <div id="pagination" class="pagination"></div>
      </main>
    </div>
  </div>
  <script src="../../../shared/js/api.js"></script>
  <script src="js/logs.js"></script>
    <script src="../../admin/js/sidebar.js"></script>
</body>
</html>
