  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header"><h2> Admin</h2></div>
      <ul class="sidebar-menu">
        <li><a href="../../dashboard.html">Dashboard</a></li>
        <li><a href="../../vendeurs/index.html">Vendeurs</a></li>
        <li><a href="../categories/index.html">Catégories</a></li>

      </ul>
    </nav>
    <div class="main-wrapper">
      <header class="topbar">
        <h1>📏 Gestion des tailles</h1>
      </header>
      <main class="content">
        <button id="btnAjouter">➕ Nouvelle taille</button>
        <table>
          <thead><tr><th>ID</th><th>Libellé</th><th>Actions</th></tr></thead>
          <tbody id="itemsBody"></tbody>
        </table>
        <!-- Modale -->
        <div id="modalItem" class="modal" style="display:none;">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitle">Ajouter une taille</h3>
            <form id="formItem">
              <input type="hidden" id="itemId">
              <div class="input-group">
                <label>Libellé</label>
                <input type="text" id="libelle" required>
              </div>
              <button type="submit">💾 Enregistrer</button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="../../../shared/js/api.js"></script>
  <script src="js/tailles.js"></script>
