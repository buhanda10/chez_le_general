    <div class="main-wrapper">
      <header class="topbar">
        <h1> Gestion des couleurs</h1>
      </header>
      <main class="content">
        <button id="btnAjouter"> Nouvelle couleur</button>
        <table>
          <thead><tr><th>ID</th><th>Libellé</th><th>Actions</th></tr></thead>
          <tbody id="itemsBody"></tbody>
        </table>
        <div id="modalItem" class="modal" style="display:none;">
          <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitle">Ajouter une couleur</h3>
            <form id="formItem">
              <input type="hidden" id="itemId">
              <div class="input-group">
                <label>Libellé</label>
                <input type="text" id="libelle" required>
              </div>
              <button type="submit"> Enregistrer</button>
            </form>
          </div>
        </div>
      </main>
