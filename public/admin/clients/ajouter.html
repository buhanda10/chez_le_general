<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter un client</title>
  <link rel="stylesheet" href="../../admin/css/dashboard.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header"><h2> Admin</h2></div>
      <ul class="sidebar-menu">
        <li><a href="../../admin/dashboard.html">Dashboard</a></li>
        <li><a href="index.html" class="active"> Clients</a></li>
      </ul>
    </nav>
    <div class="main-wrapper">
      <header class="topbar">
        <h1>Ajouter un client</h1>
        <a href="index.html" class="btn-link">← Retour</a>
      </header>
      <main class="content">
        <form id="formClient" class="form-container">
          <div class="input-group"><label>Nom</label><input type="text" id="nom"></div>
          <div class="input-group"><label>Prénom</label><input type="text" id="prenom"></div>
          <div class="input-group"><label>Téléphone *</label><input type="text" id="telephone" required></div>
          <div class="input-group"><label>Adresse</label><textarea id="adresse" rows="3"></textarea></div>
          <button type="submit"> Enregistrer</button>
          <p id="message"></p>
        </form>
      </main>
    </div>
  </div>
  <script src="../../../shared/js/api.js"></script>
  <script src="js/ajouter.js"></script>
</body>
</html>
