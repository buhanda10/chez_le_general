<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapports & Analyses</title>
  <link rel="stylesheet" href="../../admin/css/dashboard.css">
  <link rel="stylesheet" href="css/style.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar-container">
    </nav>

    <!-- Contenu principal -->
    <div class="main-wrapper">
      <header class="topbar">
        <h1>Rapports & Analyses</h1>
        <div class="actions">
          <button id="btnImprimer" class="btn-link no-print">🖨️ Imprimer le rapport</button>
        </div>
      </header>
      <main class="content">
        <!-- Filtres (cachés à l'impression) -->
        <div class="filtres no-print">
          <label>Du :</label>
          <input type="date" id="date_debut">
          <label>Au :</label>
          <input type="date" id="date_fin">
          <button id="btnAppliquer" class="btn-link">Appliquer</button>
        </div>

        <!-- KPI -->
        <div class="kpi-container" id="kpiContainer"></div>

        <!-- Graphiques -->
        <div class="grid-2col">
          <div class="card">
            <h3>Ventes par jour</h3>
            <canvas id="chartVentesJour" height="200"></canvas>
          </div>
          <div class="card">
            <h3>Top Produits</h3>
            <canvas id="chartTopProduits" height="200"></canvas>
          </div>
          <div class="card">
            <h3>Performance Vendeurs</h3>
            <canvas id="chartVendeurs" height="200"></canvas>
          </div>
          <div class="card">
            <h3>Modes de paiement</h3>
            <canvas id="chartPaiement" height="200"></canvas>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="../../../shared/js/api.js"></script>
  <script src="js/rapports.js"></script>
    <script src="../../admin/js/sidebar.js"></script>
</body>
</html>
