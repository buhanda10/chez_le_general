<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: white;
      color: black;
      padding: 20px;
      max-width: 80mm;
      margin: auto;
    }
    .ticket { width: 100%; }
    .header { text-align: center; margin-bottom: 10px; }
    .header img { max-width: 60px; max-height: 60px; }
    .header h2 { font-size: 14px; margin: 5px 0; }
    .header p { font-size: 10px; }
    .divider { border-top: 1px dashed #000; margin: 8px 0; }
    .info-vente { font-size: 10px; margin-bottom: 8px; }
    .info-vente div { margin-bottom: 2px; }
    table { width: 100%; font-size: 10px; border-collapse: collapse; }
    th { text-align: left; padding-bottom: 4px; }
    td { padding: 2px 0; }
    .right { text-align: right; }
    .remarque { font-size: 10px; text-align: center; margin-top: 10px; }
    @media print {
      body { padding: 0; max-width: none; }
      .no-print { display: none !important; }
    }
    .no-print { margin-top: 10px; text-align: center; }
    button { padding: 5px 10px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="ticket" id="ticketContent">
    Chargement...
  </div>
  <div class="no-print" id="actions">
    <button onclick="window.print()">🖨️ Imprimer</button>
    <button onclick="window.close()">Fermer</button>
  </div>

  <script src="../../shared/js/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) {
      document.getElementById('ticketContent').innerHTML = 'Aucune vente spécifiée.';
    } else {
      chargerTicket(id);
    }

    async function chargerTicket(venteId) {
      try {
        const token = localStorage.getItem('token');
        if (!token) throw new Error('Non connecté');
        const res = await fetch(`/api/vendeur/ventes/${venteId}/ticket-data`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Erreur');
        afficherTicket(data);
      } catch (err) {
        document.getElementById('ticketContent').innerHTML = `<p>Erreur: ${err.message}</p>`;
        document.getElementById('actions').style.display = 'none';
      }
    }

    function afficherTicket(data) {
      const { vente, lignes, boutique } = data;
      const totalSansRemise = lignes.reduce((sum, l) => sum + (l.quantite * l.prix_unitaire), 0);
      const remise = parseFloat(vente.remise) || 0;
      const totalFinal = totalSansRemise - remise;

      document.getElementById('ticketContent').innerHTML = `
        <div class="header">
          ${boutique.logo ? `<img src="${boutique.logo}" alt="Logo">` : ''}
          <h2>${boutique.nom_boutique || 'Ma Boutique'}</h2>
          <p>${boutique.adresse || ''}</p>
          <p>Tél: ${boutique.telephone || ''}</p>
        </div>
        <div class="divider"></div>
        <div class="info-vente">
          <div><strong>Facture:</strong> ${vente.reference_vente}</div>
          <div><strong>Date:</strong> ${new Date(vente.created_at).toLocaleString()}</div>
          <div><strong>Vendeur:</strong> ${vente.vendeur_nom || ''}</div>
          <div><strong>Client:</strong> ${vente.client_nom ? vente.client_nom + ' ' + (vente.client_prenom||'') : 'Client comptoir'} ${vente.client_telephone ? ' - ' + vente.client_telephone : ''}</div>
          <div><strong>Paiement:</strong> ${vente.mode_paiement || ''}</div>
        </div>
        <div class="divider"></div>
        <table>
          <thead><tr><th>Produit</th><th class="right">Qté</th><th class="right">Prix U.</th><th class="right">Total</th></tr></thead>
          <tbody>
            ${lignes.map(l => `
              <tr>
                <td>${l.nom} ${l.taille ? l.taille : ''} ${l.couleur ? l.couleur : ''}</td>
                <td class="right">${l.quantite}</td>
                <td class="right">${parseFloat(l.prix_unitaire).toFixed(2)}</td>
                <td class="right">${(l.quantite * l.prix_unitaire).toFixed(2)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="divider"></div>
        <div style="font-size:10px;">
          <div>Total articles: ${totalSansRemise.toFixed(2)} ${boutique.devise || 'FCFA'}</div>
          ${remise > 0 ? `<div>Remise: -${remise.toFixed(2)} ${boutique.devise || 'FCFA'}</div>` : ''}
          <div style="font-size:14px; font-weight:bold; margin-top:4px;">Total: ${totalFinal.toFixed(2)} ${boutique.devise || 'FCFA'}</div>
        </div>
        <div class="divider"></div>
        <div class="remarque">Merci pour votre achat !</div>
      `;
    }
  </script>
</body>
</html>
