<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion – Gestion Boutique</title>
  <link rel="stylesheet" href="shared/css/login.css">
</head>
<body>
  <div class="login-container">
    <h1> Gestion Boutique</h1>
    <form id="loginForm">
      <div class="input-group">
        <label>Nom d'utilisateur</label>
        <input type="text" id="nom" required placeholder="votre nom d'utilisateur">
      </div>
      <div class="input-group">
        <label>Mot de passe</label>
        <input type="password" id="mdp" required placeholder="••••••••">
      </div>
      <button type="submit">Se connecter</button>
      <p id="message" class="message"></p>
    </form>
  </div>
  <script src="shared/js/api.js"></script>
  <script src="shared/js/login.js"></script>
</body>
</html>
